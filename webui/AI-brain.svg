<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="EasyAi">
  <style>
    .frame {
      fill: none;
      stroke: #5b8dee;
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .core {
      fill: #5b8dee;
    }
    @media (prefers-color-scheme: dark) {
      .frame { stroke: #7aa2ff; }
      .core  { fill:   #7aa2ff; }
    }
  </style>

  <!-- Isometric cube outline. Top vertex (32,8), right (56,20), bottom (32,56), left (8,20). -->
  <path class="frame" d="M32 8 L56 20 L56 44 L32 56 L8 44 L8 20 Z"/>
  <!-- Internal Y meeting at center to give depth. -->
  <path class="frame" d="M32 8 L32 32"/>
  <path class="frame" d="M56 20 L32 32"/>
  <path class="frame" d="M8 20 L32 32"/>
  <!-- Core dot at the meeting point. -->
  <circle class="core" cx="32" cy="32" r="3"/>
</svg>
